{% extends 'base.html' %}
{% block content %}
<section class="auth-card">
  <h1>Iniciar sesión</h1>
  <form method="post">
    <label>Correo <input type="email" name="email" required></label>
    <label>Contraseña <input type="password" name="password" required></label>
    <button class="cta" type="submit">Ingresar</button>
  </form>
  <p>¿No tienes cuenta? <a href="{{ url_for('main.register') }}">Regístrate</a>.</p>
</section>
{% endblock %}
